version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: solscore
      POSTGRES_PASSWORD: solscore123
      POSTGRES_DB: solscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://solscore:solscore123@postgres:5432/solscore
      REDIS_URL: redis://redis:6379/0
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      SOLANA_RPC_URL: https://api.devnet.solana.com
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://solscore:solscore123@postgres:5432/solscore
      REDIS_URL: redis://redis:6379/0
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      SOLANA_RPC_URL: https://api.devnet.solana.com
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A tasks.score_job worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

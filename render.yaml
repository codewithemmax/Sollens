services:
  - type: web
    name: solscore-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HELIUS_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: AUTHORITY_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solscore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: solscore-redis
          property: connectionString

  - type: worker
    name: solscore-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks.score_job worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HELIUS_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: AUTHORITY_PRIVATE_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solscore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: solscore-redis
          property: connectionString

  - type: redis
    name: solscore-redis
    plan: free
    ipAllowList: []

databases:
  - name: solscore-db
    databaseName: solscore
    user: solscore
    plan: free
